<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNotes</title>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "2ee7ad31-76db-4e8c-9660-9a83269b68c6",
    });
  });
</script>
<meta name="google-site-verification" content="9PvFobY6qcalJMCqB5-4-nZLePuBZGmhA9ioe6R4cgc" />

<meta name="description" content="SnapNotes is a fast and simple note-taking app that helps you create, organize, pin, search, and share notes with ease." />
<meta property="og:title" content="SnapNotes | Smart Note-Taking Made Simple" />

<meta property="og:title"
content="SnapNotes | Smart Note-Taking Made Simple" />
<meta property="og:description" content="Capture ideas instantly, organize notes by category, pin important notes, search quickly, and share notes with ease." />

<meta property="og:type" content="website" />

<meta property="og:image" content="https://snapnotesmw.vercel.app/snapnotes-preview.png" />

<meta name="keywords" content="SnapNotes, notes app, note taking, productivity, organize notes, share notes, pinned notes, dark mode notes" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- THEME TOGGLE -->
    <button id="themeToggle">🌙</button>

    <!-- HEADER -->
    
    <h2>SnapNotes</h2>
    <p id="titlePara">Save Your Mind.</p>

   <!-- NOTES COUNT -->
    <p id="notesCount" style="text-align:center;">Saved Notes: 0</p> 

    <!-- INPUT SECTION -->
    <div class="inputSection">
        <input type="text" id="textInput" placeholder="Enter Your Notes Here">
        <select id="categorySelect">
            <option value="general">General</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="important">Important</option>
        </select>
        <button id="addBtn" onclick="addNote()">Add Notes</button>
    </div>

      <!--SEARCH NOTES AND FILTER CONTROLS-->
     
   <div style="text-align:center; margin-top:10px;" class="filter-controls">

    <!-- SEARCH INPUT -->
    
    <input type="text" id="searchInput" placeholder="Search notes...">

    <!-- CATEGORY FILTER -->
    
    
        <select id="categoryFilter">
            <option value="all">Filters</option>
            <option value="general">General</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="important">Important</option>
        </select>
    </div>

    <!-- EMPTY STATE -->
    <p id="emptyState">No notes yet. Start adding some!</p>

    <!-- NOTES CONTAINER -->
    <div id="notesContainer" class="notesContainer"></div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>
</html>
