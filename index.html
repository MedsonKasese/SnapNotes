<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapNotes</title>
   
    <meta name="google-site-verification" content="9PvFobY6qcalJMCqB5-4-nZLePuBZGmhA9ioe6R4cgc" />
    <meta name="description" content="SnapNotes is a fast and simple note-taking app that helps you create, organize, pin, search, and share notes with ease." />
    <meta property="og:title" content="SnapNotes | Smart Note-Taking Made Simple" />
    <meta property="og:description" content="Capture ideas instantly, organize notes by category, pin important notes, search quickly, and share notes with ease." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://snapnotesmw.vercel.app/snapnotes-preview.png" />
    <meta name="keywords" content="SnapNotes, notes app, note taking, productivity, organize notes, share notes, pinned notes, dark mode notes" />
    
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

 
</head>
<body>

    <!-- HEADER -->
    <header class="app-header">
        <button id="themeToggle">🌙</button>
        
        <!-- SEARCH & FILTER CENTER -->
        <div class="header-center">
            <div class="combined-controls">
                <div class="search-box"> 
            
               <input type="text" id="searchInput" placeholder="Search...">
                </div>
                <div class="divider"></div>
                <div class="filter-box">
                    <select id="categoryFilter">
                        <option value="all">Filters</option>
                        <option value="general">General</option>
                        <option value="work">Work</option>
                        <option value="personal">Personal</option>
                        <option value="ideas">Ideas</option>
                        <option value="important">Important</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="userSection">
            <button id="loginBtn">Sign In</button>
            <div id="userAvatar" style="display: none;"></div>
        </div>
    </header>

    <!-- 
TITLE SECTION
    <h2 style="text-align: center;">SnapNotes</h2>
  -->
    <p id="titlePara" style="text-align: center;">Save Your Mind.</p>

    <!-- NOTES COUNT -->
    <p id="notesCount" style="text-align:center;margin-top :10px">Saved Notes: 0</p> 

    <!-- INPUT SECTION -->
    <div class="inputSection">
        <div style="width: 100%; display: flex; flex-direction: column; gap: 4px;">
            <input type="text" id="textInput" placeholder="Enter Your Notes Here" maxlength="200">
            <small id="charCount" style="text-align:left; color: #888; margin-left: 5px;">0/200</small>
        </div>
        <select id="categorySelect">
            <option value="general">General</option>
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="ideas">Ideas</option>
            <option value="important">Important</option>
        </select>
        <button id="addBtn" onclick="addNote()">Add Notes</button>
    </div>


  <!-- OLD SEARCH AND FILTER REMOVED (MOVED TO HEADER) -->

    <!-- EMPTY STATE -->
    <p id="emptyState" style="text-align: center; margin-top: 50px;">No notes yet. Start adding some!</p>

    <!-- NOTES CONTAINER -->
    <div id="notesContainer" class="notesContainer"></div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast"></div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="auth-modal">
        <div class="auth-sheet">
            <h3>Sign In to Sync Notes</h3>
            <input type="email" id="emailInput" placeholder="Email" required>
            <input type="password" id="passwordInput" placeholder="Password" required>
            <button id="signinBtn">Sign In</button>
            <button id="signupBtn">Create Account</button>
            <button id="closeModalBtn" style="background-color: #FF4545;">Cancel</button>
        </div>
    </div>

    <!-- SHARE TEMPLATE (HIDDEN) -->
    <div id="shareTemplate" style="position: absolute; left: -9999px; top: -9999px; width: 400px; padding: 30px; background: white; border-radius: 15px; font-family: sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <div id="shareContent" style="font-size: 18px; line-height: 1.6; color: #333; margin-bottom: 20px; white-space: pre-wrap; word-wrap: break-word;"></div>
        <div id="shareTimestamp" style="font-size: 14px; color: #777; border-top: 1px solid #eee; padding-top: 10px;"></div>
        <div style="margin-top: 20px; text-align: center; font-weight: bold; color: #2A84FF; font-size: 14px;">Made With SnapNotes</div>
    </div>

    <!-- JAVASCRIPT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notes.js"></script>
    <script type="module" src="js/firebaseConfig.js"></script>
    <script type="module" src="js/firestore.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
